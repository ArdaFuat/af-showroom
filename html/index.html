<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArdaFuat Showroom</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main id="app" class="hidden">
        <section class="catalog-shell">
            <aside class="sidebar">
                <div class="brand-row">
                    <div class="logo">AF</div>
                    <div>
                        <h1 data-locale="showroom_name">ArdaFuat Showroom</h1>
                        <p data-locale="showroom_subtitle">Vehicle catalog</p>
                    </div>
                </div>

                <div class="search-box">
                    <input id="searchInput" type="text" placeholder="Search vehicle, brand or model..." autocomplete="off" />
                </div>

                <div class="side-title" data-locale="ui_categories">Categories</div>
                <div id="categoryList" class="category-list"></div>
            </aside>

            <section class="content">
                <header class="topbar">
                    <div>
                        <h2 id="activeTitle">All Vehicles</h2>
                        <p id="vehicleCount">0 vehicles listed</p>
                    </div>
                    <button id="closeBtn" class="close-btn">ESC</button>
                </header>

                <div id="vehicleGrid" class="vehicle-grid"></div>
            </section>
        </section>

        <section id="detailPanel" class="detail-panel hidden">
            <div class="detail-card">
                <button id="detailCloseBtn" class="detail-close">×</button>
                <div class="detail-hero">
                    <img id="detailImage" alt="Vehicle image" />
                </div>

                <div class="detail-body">
                    <div class="detail-brand-row">
                        <img id="detailBrandLogo" class="brand-logo hidden" alt="Brand logo" />
                        <div>
                            <div id="detailBrand" class="detail-brand">Brand</div>
                            <h3 id="detailName">Vehicle</h3>
                        </div>
                    </div>

                    <p id="detailDescription" class="detail-description"></p>

                    <div class="info-grid">
                        <div class="info-box"><span data-locale="ui_price">Price</span><strong id="detailPrice">-</strong></div>
                        <div class="info-box"><span data-locale="ui_stock">Stock</span><strong id="detailStock">-</strong></div>
                        <div class="info-box"><span data-locale="ui_category">Category</span><strong id="detailCategory">-</strong></div>
                        <div class="info-box"><span data-locale="ui_model">Model</span><strong id="detailSpawncode">-</strong></div>
                        <div class="info-box"><span data-locale="ui_trunk">Trunk</span><strong id="detailTrunk">-</strong></div>
                    </div>

                    <div class="performance-block">
                        <h4 data-locale="ui_performance">Performance</h4>
                        <div id="performanceList"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
